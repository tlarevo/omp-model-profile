name: omp drift

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Typecheck against omp main
        id: check
        run: |
          set -o pipefail
          bun run check:omp-head 2>&1 | tee drift-output.log
        continue-on-error: true
      - name: Upload diagnostics
        if: steps.check.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: drift-output
          path: drift-output.log
      - name: Fail the job if drift was detected
        if: steps.check.outcome == 'failure'
        run: exit 1

  # Runs only when `drift` fails. Files (or reuses) a tracking issue with the
  # captured tsgo diagnostics, and — when a Copilot-capable token is
  # available — assigns it to the Copilot coding agent (copilot-swe-agent[bot])
  # so it can investigate and open a fix PR unattended.
  #
  # Copilot assignment requires:
  #   - Copilot cloud agent enabled for this repo/account (any paid Copilot
  #     plan — Pro, Pro+, Business, or Enterprise; the issue-assignment API
  #     used here is broader than the Business/Enterprise-only agent-tasks
  #     API). See https://docs.github.com/en/copilot/concepts/agents/cloud-agent/access-management
  #   - A `COPILOT_ASSIGN_PAT` repository secret. As of 2026-06-28, a
  #     fine-grained PAT was empirically confirmed NOT to work for this
  #     preview feature: both the REST `POST /issues/{number}/assignees`
  #     endpoint and the GraphQL `addAssigneesToAssignable` mutation return
  #     `403 Resource not accessible by personal access token` for a
  #     fine-grained PAT with all 5 documented permissions (Metadata read;
  #     Actions/Contents/Issues/Pull requests read+write) — the identical
  #     call succeeded with an OAuth-based `gh` CLI token (not yet tested
  #     with a classic PAT). GitHub's docs say a classic PAT with the
  #     `repo` scope should work; try that if a fine-grained PAT 403s here.
  #     The default GITHUB_TOKEN cannot assign Copilot either way —
  #     assignment requires a user-to-server token.
  #
  # Implementation note: creating an issue via REST with
  # `assignees: ["copilot-swe-agent[bot]"]` + `agent_assignment` in the same
  # POST silently succeeds WITHOUT actually assigning Copilot — no error,
  # just a no-op on those fields (empirically confirmed). The issue is
  # therefore created plainly first, then Copilot is assigned as a
  # separate, best-effort step via the GraphQL `addAssigneesToAssignable`
  # mutation (requires the `GraphQL-Features` header). If that step fails
  # for any reason (PAT unset/wrong type, cloud agent not enabled), the
  # issue still exists, just unassigned — drift is never silently lost.
  file-agent-task:
    needs: drift
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    steps:
      - name: Download diagnostics
        uses: actions/download-artifact@v4
        with:
          name: drift-output
        continue-on-error: true
      - name: File a drift issue, then best-effort assign Copilot
        env:
          GH_TOKEN: ${{ github.token }}
          COPILOT_ASSIGN_PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --search 'in:title "omp HEAD drift" is:open' \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Open drift issue #$existing already exists — skipping."
            exit 0
          fi

          if [ -f drift-output.log ]; then
            diagnostics=$(tail -n 200 drift-output.log)
          else
            diagnostics="Diagnostics log unavailable (the drift job likely failed before producing one) — see the run for details."
          fi

          title="omp HEAD drift: plugin fails to typecheck against the current omp source"
          body=$(printf '%s\n' \
            "The weekly \`omp-drift\` workflow detected that this plugin no longer typechecks against the current \`can1357/oh-my-pi\`@main source (\`bun run check:omp-head\`)." \
            "" \
            "Failing run: $RUN_URL" \
            "" \
            "Diagnostics (last 200 lines):" \
            '```' \
            "$diagnostics" \
            '```' \
            "" \
            "Update this plugin's source to match the new host API shape, then verify with \`bun run check && bun test\` (against the installed host) AND \`bun run check:omp-head\` (against omp HEAD) before opening a PR.")

          # 1. Create the issue, unassigned (assignment is a separate step —
          #    see implementation note above). Explicit success check below
          #    because `set -e` does NOT reliably catch a failing command
          #    substitution used in a variable assignment in bash.
          plain_payload=$(jq -n --arg title "$title" --arg body "$body" '{title: $title, body: $body}')
          if ! issue_json=$(gh api --method POST -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" "/repos/$GITHUB_REPOSITORY/issues" \
            --input - <<< "$plain_payload"); then
            echo "::error::Failed to create the drift-tracking issue." >&2
            exit 1
          fi
          issue_node_id=$(jq -r .node_id <<< "$issue_json")
          echo "Filed: $(jq -r .html_url <<< "$issue_json")"

          if [ -z "$COPILOT_ASSIGN_PAT" ]; then
            echo "::warning::COPILOT_ASSIGN_PAT is not set — issue filed unassigned. Add the secret to enable auto-assignment to Copilot."
            exit 0
          fi

          owner="${GITHUB_REPOSITORY%%/*}"
          name="${GITHUB_REPOSITORY##*/}"

          repo_id=$(GH_TOKEN="$COPILOT_ASSIGN_PAT" gh api graphql -f query='
            query($owner: String!, $name: String!) {
              repository(owner: $owner, name: $name) { id }
            }' -f owner="$owner" -f name="$name" --jq '.data.repository.id' 2> /tmp/repo.err) || true

          bot_id=$(GH_TOKEN="$COPILOT_ASSIGN_PAT" gh api graphql -f query='
            query($owner: String!, $name: String!) {
              repository(owner: $owner, name: $name) {
                suggestedActors(capabilities: [CAN_BE_ASSIGNED], first: 50) {
                  nodes { login ... on Bot { id } }
                }
              }
            }' -f owner="$owner" -f name="$name" \
            --jq '.data.repository.suggestedActors.nodes[] | select(.login == "copilot-swe-agent") | .id' 2> /tmp/bot.err) || true

          if [ -z "$repo_id" ] || [ -z "$bot_id" ]; then
            echo "::warning::Could not resolve repository or copilot-swe-agent IDs (Copilot cloud agent may not be enabled for this repo/account, or the PAT lacks scope/type support). Issue stays unassigned."
            cat /tmp/repo.err /tmp/bot.err 2>/dev/null || true
            exit 0
          fi

          instructions="Read the diagnostics in the issue body (or re-run \`bun run check:omp-head\`) to see the exact tsgo errors. Fix the drift in this plugin's src/ so it typechecks against the current omp host source again. Verify with \`bun run check && bun test\` (against the installed host) AND \`bun run check:omp-head\` (against omp HEAD) before opening the PR."

          if GH_TOKEN="$COPILOT_ASSIGN_PAT" gh api graphql \
            -H 'GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection' \
            -f query='
              mutation($issueId: ID!, $botId: ID!, $repoId: ID!, $instructions: String!) {
                addAssigneesToAssignable(input: {
                  assignableId: $issueId,
                  assigneeIds: [$botId],
                  agentAssignment: { targetRepositoryId: $repoId, baseRef: "main", customInstructions: $instructions }
                }) {
                  assignable { ... on Issue { id } }
                }
              }' \
            -f issueId="$issue_node_id" -f botId="$bot_id" -f repoId="$repo_id" -f instructions="$instructions" \
            > /tmp/assign.json 2> /tmp/assign.err; then
            echo "Assigned copilot-swe-agent[bot]."
          else
            echo "::warning::Could not assign copilot-swe-agent[bot] via GraphQL (a fine-grained PAT may not support this — try a classic PAT). Issue stays unassigned."
            cat /tmp/assign.err
          fi
